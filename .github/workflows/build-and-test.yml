name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7.0"

jobs:
  export-web:
    name: Export Web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false

      - name: Install export templates
        run: godot --headless --install-export-templates

      - name: Import project resources
        run: godot --headless --path . --import

      - name: Create build directory
        run: mkdir -p build/web

      - name: Export Web build
        run: godot --headless --path . --export-release "Web" build/web/index.html

      - name: Zip web build for itch.io
        run: |
          cd build/web
          zip -r ../../cut-down-web.zip .

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cut-down-web
          path: cut-down-web.zip
          retention-days: 30
