
name: Godot CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
      - 'releases'
      
env:
  GODOT_VERSION: 4.7.1

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-20.04
    container:
      image: barichello/godot-ci:4.7.1
    steps:
      - name: Checkout
        uses: actions/checkout@v3.1.0
        with:
          lfs: true
      - name: Export Web
        uses: ./.github/actions/export-project
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          export-type: 'web'
          export-name: 'index.html'
          release: false
